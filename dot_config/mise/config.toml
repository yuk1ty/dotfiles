[tools]
# Programming Languages
python = "3.13.13"
java = ["17", "21"]
go = "latest"
gleam = "latest"
node = "latest"

# IaC
terraform = ["1.9.5"]

# Cargo Plugins
"cargo:bp" = "latest"
"cargo:cargo-wizard" = "latest"
"cargo:cargo-make" = "latest"
"cargo:cargo-machete" = "latest"
"cargo:cargo-sort" = "latest"
"cargo:cargo-features-manager" = "latest"
"cargo:cargo-chef" = "latest"
"cargo:mergiraf" = "latest"

# Go Packages
"go:github.com/d-kuro/gwq/cmd/gwq" = "latest"

[settings]
legacy_version_file_disable_tools = ["terraform"]
experimental = true

[tasks.install_tools]
description = "Install tools specified in the configuration file."
run = "pip install headroom-ai[all]"
